# Default przn theme. Used when there's neither a `theme.yml` alongside the
# deck nor a `--theme path/to/file.yml` flag.
#
# To customize: drop a `theme.yml` next to your deck (loaded automatically),
# or pass `--theme path/to/your.yml` to override that.
# All keys are optional — unspecified values fall back to these defaults.

font:                   # body text typography (paragraphs, lists, h2–h6, code, tables, …)
  family:               # font family (terminal: OSC 66 f=, requires Echoes)
  size:                 # OSC 66 scale: numeric (1–7) or named (xx-small … xxxx-large); default 2 (small)
  color:                # named ANSI or 6-digit hex; falls back to the terminal's default fg when unset

title:                  # h1 typography (slide titles); each attribute is independent of `font`
  family:               # font family (terminal: OSC 66 f=, requires Echoes)
  size:                 # OSC 66 scale: numeric (1–7) or named (xx-small … xxxx-large); default x-large (4)
  color:                # named ANSI or 6-digit hex; falls back to the terminal's default fg when unset

bullet:                 # unordered-list marker; also h2–h6 heading prefix
  text: "・"            # the glyph
  size:                 # OSC 66 scale (1–7) for the bullet; default = body text's scale
  color:                # named ANSI or 6-digit hex; falls back to body text color (font.color) when unset

code:                   # fenced code block (and inline `<code>`) typography
  family:               # font family (terminal: OSC 66 f=, requires Echoes); falls back to font.family
  size:                 # OSC 66 scale: numeric (1–7) or named (xx-small … xxxx-large); default = body text's scale
  color:                # fg for all code text — fenced blocks and inline `<code>`; named ANSI or 6-digit hex; falls back to body fg
  bg:                   # block background (fenced only); named ANSI or 6-digit hex; default = dim gray (ANSI 256-color 236)

# Default slide background, applied when a slide has no <bg .../> directive.
# `color` / `from` / `to` / `angle` use Echoes' OSC 7772 (no-op on other
# terminals). `image` uses the Kitty Graphics Protocol (works on Kitty,
# Echoes, Wezterm, Ghostty — PNG only) and wins over `color` / gradient
# when both are set. All unset = no background override.
background:
  image:                # background image path, relative to the deck; PNG only
  color:                # solid color, e.g. "#1a1a2e"
  from:                 # gradient endpoint, e.g. "#1a1a2e"
  to:                   # gradient endpoint, e.g. "#16213e"
  angle:                # gradient angle in degrees (0 = left→right, 90 = bottom→top)
  type:                 # gradient type; defaults to "linear"

# Bottom-of-screen slide counter. Without `duration:`, przn shows a
# plain " N / M " counter at the bottom-right. Set `duration:` to opt
# into the 🐇 / 🐢 runner bar (a nod to the Rabbit presentation tool):
# slide-progress (🐇) and elapsed-vs-goal (🐢) anchored between the
# left (current) and right (total) numbers.
counter:
  color:                # named ANSI or 6-digit hex; default = dim
  duration:             # "30m", "1h30m", "1800s", or plain integer seconds; opt in to the runner bar

# Slide layouts. Each layout names an ordered list of slots; a slot is a
# rectangular region with x / y / width / height (1-based cells, or N%
# of the terminal width/height). A slide picks a layout via an h1 IAL,
# e.g. `# Title {layout=two-column}`. The `title` slot, when present,
# is auto-filled from the h1; other slots fill in declaration order,
# advanced by a `<slot/>` (or `<slot name="..."/>`) marker.
#
# Two layouts have special semantics:
#   `default` — theme-wide fallback for slides without an
#               `{layout=...}` IAL. Shipped identical to
#               `title-content`: centered title band across the top,
#               content below. Override it in your own theme to give
#               every plain slide a different layout.
#   `cover`   — automatic for slide 0 when no IAL is set, roughly
#               emulating Keynote's "Title" slide: big centered
#               heading near the middle, smaller subtitle near the
#               bottom. Override / delete from your own theme to opt
#               out — explicit `{layout=...}` on slide 0 still wins.
# Other named layouts are opt-in via `# Title {layout=name}`.
layouts:
  default:
    - {name: title,   x: 5, y: 3,  width: 90%, height: 6, align: center}
    - {name: content, x: 5, y: 10, width: 90%, height: 80%}
  cover:
    - {name: title,    x: 1, y: 35%, width: 100%, height: 25%, align: center, size: xxx-large}
    - {name: subtitle, x: 1, y: 80%, width: 100%, height: 15%, align: center}
  title-only:
    - {name: title, x: 5, y: 40%, width: 90%, height: 20%, align: center}
  takahashi:
    - {name: title, x: 1, y: 40%, width: 100%, height: 20%, align: center, size: xxxx-large}
  title-content:
    - {name: title,   x: 5, y: 3,  width: 90%, height: 6, align: center}
    - {name: content, x: 5, y: 10, width: 90%, height: 80%}
  two-column:
    - {name: title, x: 5,   y: 3,  width: 90%, height: 6, align: center}
    - {name: left,  x: 5,   y: 10, width: 45%, height: 80%}
    - {name: right, x: 50%, y: 10, width: 45%, height: 80%}
  photo-caption:
    - {name: title,   x: 5,   y: 3,  width: 90%, height: 6, align: center}
    - {name: image,   x: 5,   y: 10, width: 60%, height: 70%}
    - {name: caption, x: 65%, y: 10, width: 30%, height: 70%}
